<body>
    <!-- Container for the header -->
  <div id="header-container"></div>
  <script src="js/load-snippets.js"></script>

 <div class="container mt-5">
  <h2>
    QCMAT Internship Participant Login
  </h2>
</div>
<section class="form-page">

        <div class="login-wrapper">

            <div class="glass-form login-form">

                <div class="login-icon">
                    <i class="fas fa-user-shield"></i>
                </div>

                <h2>
                    Participant Login
                </h2>

                <p class="login-subtitle">
                    Access your internship dashboard,
                    attendance, evaluations and certificates.
                </p>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email"
                           id="email"
                           placeholder="Email Address">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password"
                           id="password"
                           placeholder="Password">
                </div>

                <button class="modern-btn"
                        onclick="login()">
                    Login to Portal
                </button>

            </div>

        </div>

    </section>

    <script src="js/config.js"></script>

    <script>

    async function login() {

        const data = {
            action: 'login',
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.status === 'success') {

            localStorage.setItem('studentName', result.name);
            localStorage.setItem('studentEmail', data.email);

            window.location.href = 'dashboard.html';

        } else {

            alert('Invalid Login Credentials');

        }
    }

    </script>
