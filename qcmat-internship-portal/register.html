<div class="container mt-5">
  <h2>
    QCMAT Internship Registration
  </h2>
  <form id="regForm">
    <input type="text" class="form-control mb-3"
           placeholder="Full Name" id="name" required>
    <input type="email" class="form-control mb-3"
           placeholder="Email" id="email" required>
    <input type="text" class="form-control mb-3"
           placeholder="Mobile" id="mobile" required>
    <input type="text" class="form-control mb-3"
           placeholder="College" id="college">
    <textarea class="form-control mb-3"
              placeholder="Address" id="address"></textarea>
    <button class="btn btn-primary">
      Register
    </button>
  </form>
</div>
<script>
document.getElementById('regForm')
.addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = {
    action: 'register',
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    mobile: document.getElementById('mobile').value,
    college: document.getElementById('college').value,
    address: document.getElementById('address').value
  };
  await fetch('https://script.google.com/macros/s/AKfycbzJEmsbcD_xV-goqRstk-wwypfSDNlOldNi24vaZPQH8VkkcvmtjvqjNAJw5_U3urQ/exec', {
    method: 'POST',
    body: JSON.stringify(data)
  });
  alert('Registration Submitted Successfully');
});
</script>
